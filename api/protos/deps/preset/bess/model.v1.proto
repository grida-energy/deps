syntax = "proto3";

package deps.preset.bess.v1;

option java_package = "io.github.grida_energy.deps.preset.bess.v1";

import "deps/model/esd/model.v1.proto";
import "deps/model/pcs/model.v1.proto";
import "deps/model/source/model.v1.proto";

import "deps/rpc/header.v1.proto";
import "google/protobuf/timestamp.proto";

// 배터리 + 인버터로 구성된 단순 BESS 모델
message Bess {
  // // BESS 시스템 명령
  // message Command {
  //   oneof cmd {
  //     // 전체 시스템 정지
  //     bool estop = 3;
  //   }
  // }
  // 배터리 모델
  .deps.model.esd.v1.EsdBank bank = 1;
  // PCS 모델
  .deps.model.pcs.v1.ThreePhasePcsPart pcs = 2;
  // Off Grid (부하 연결 부)
  .deps.model.pcs.v1.ThreePhaseGridPart off_grid = 3;
  // On Grid (계통 연결 부)
  .deps.model.pcs.v1.ThreePhaseGridPart on_grid = 4;
  // DcDc 모델 (옵션)
  .deps.model.pcs.v1.DcDcConverter dcdc = 5;
  // PV 연결 부 (옵션)
  .deps.model.source.v1.PvLine pv = 6;
}


// BESS 명령
message BessCommand {
  oneof cmd {
    // 배터리 명령
    .deps.model.esd.v1.EsdBank.Command bank = 1;
    // PCS 명령
    .deps.model.pcs.v1.ThreePhasePcsPart.Command pcs = 2;
    // DcDc 명령
    .deps.model.pcs.v1.DcDcConverter.Command dcdc = 3;
  }
}

// RPC 메시지
message Rpc {
  // BESS 계측 정보
  message MeasureResponse {
    // 타임 스탬프
    .google.protobuf.Timestamp timestamp = 1;
    // BESS 데이터
    Bess payload = 2;
  }
  // BESS RPC 요청
  message CommandRequest {
    // 요청 헤더
    .deps.rpc.v1.Request header = 1;
    // BESS 명령
    repeated BessCommand payload = 2;
  }
  // BESS RPC 응답
  message CommandResponse {
    // 응답 헤더
    .deps.rpc.v1.Response header = 1;
    uint32 payload = 2;
  }
}
