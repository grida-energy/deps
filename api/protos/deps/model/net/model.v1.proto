message LineToLine {
  float ab = 1;
  float bc = 2;
  float ca = 3;
}
message AcLineThreePhase {
  // 3상 합
  AcLineSum sum = 1;
  // A 상
  AcLine a = 2;
  // B 상
  AcLine b = 3;
  // C 상
  AcLine c = 4;
  LineToLine pp_v = 5;
}

message Phasor {
  float x = 1;
  float y = 2;
}

message Harmonics {
  // 0 = DC, 1 = fundamental, 2 = 2nd harmonic, ...
  repeated float v_series = 1;
  repeated float a_series = 2;
  float thd_v = 3;
  float thd_a = 4;
  float tdd_a = 6;
  // Fundamental 페이저
  Phasor phs_v = 7;
  Phasor phs_a = 8;
}

message HarmonicsThreePhase {
  Harmonics a = 1;
  Harmonics b = 2;
  Harmonics c = 3;
}

message MeterThreePhase {
  AcLineThreePhase main = 1;
  HarmonicsThreePhase harmonics = 2;
}

message Rpc {
  message MeterThreePhase {
    message MeasureResponse {
      .google.protobuf.Timestamp timestamp = 1;
      .deps.model.net.v1.MeterThreePhase payload = 2;
    }
  }
}
