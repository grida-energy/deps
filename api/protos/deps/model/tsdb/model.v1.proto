syntax = "proto3";

package deps.model.tsdb.v1;

import "google/protobuf/struct.proto";
// import "deps/rpc/header.v1.proto";
import "google/protobuf/timestamp.proto";

option java_package = "io.github.grida_energy.deps.model.tsdb.v1";

enum Order {
  ORDER_ASC = 0;
  ORDER_DESC = 1;
}

enum LogKind {
  LOG_KIND_EVENT = 0;
  LOG_KIND_ALARM = 1;
  LOG_KIND_COMMAND = 2;
}

enum AlarmKind {
  ALARM_KIND_STATUS = 0;
  ALARM_KIND_WARNING = 1;
  ALARM_KIND_FAULT = 2;
}
enum AlarmStatus {
  ALARM_STATUS_CLEAR = 0;
  ALARM_STATUS_TRIGGER = 1;
}

message LogMatch {
  oneof matcher {
    LogKind log_kind = 1;
    string source_like = 2;
    string name_like = 3;
    AlarmKind alarm_kind = 4;
    string target_like = 5;
    AlarmStatus alarm_status = 6;
  }
}

message LogConstraint {
  .google.protobuf.Timestamp start = 1;
  .google.protobuf.Timestamp end = 2;
  repeated LogMatch matches = 3;
  uint32 limit = 4;
  Order order = 5;
}

message EventExtra {
  .google.protobuf.Struct tags = 5;
}

message AlarmExtra {
  AlarmKind kind = 4;
  AlarmStatus status = 5;
}

message CommandExtra {
  string target = 4;
  .google.protobuf.Struct parameters = 5;
}

message LogItem {
  .google.protobuf.Timestamp timestamp = 1;
  string source = 2;
  string name = 3;
  oneof extra {
    EventExtra event = 5;
    AlarmExtra alarm = 6;
    CommandExtra command = 7;
  }
}

message MeasureId {
  string source = 1;
  repeated string paths = 2;
}

message MeasureConstraint {
  .google.protobuf.Timestamp start = 1;
  .google.protobuf.Timestamp end = 2;
  repeated MeasureId measures = 3;
  uint32 limit = 4;
  Order order = 5;
}
