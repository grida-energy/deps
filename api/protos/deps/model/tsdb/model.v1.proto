syntax = "proto3";

package deps.model.tsdb.v1;

option java_package = "io.github.grida_energy.deps.model.tsdb.v1";

import "deps/rpc/header.v1.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

enum Order {
  ORDER_ASC = 0;
  ORDER_DESC = 1;
}

enum LogKind {
  LOG_KIND_EVENT = 0;
  LOG_KIND_ALARM = 1;
  LOG_KIND_COMMAND = 2;
}

enum AlarmKind {
  EVENT_KIND_STATUS = 0;
  EVENT_KIND_WARNING = 1;
  EVENT_KIND_FAULT = 2;
}
enum AlarmStatus {
  ALARM_STATUS_CLEAR = 0;
  ALARM_STATUS_TRIGGER = 1;
}

message LogMatch {
  oneof matcher {
    LogKind log_kind = 1;
    AlarmKind alarm_kind = 2;
    string source_like = 3;
    string name_like = 4;
    string target_like = 5;
    AlarmStatus alarm_status = 6;
  }
}

message LogConstraint {
  .google.protobuf.Timestamp start = 1;
  .google.protobuf.Timestamp end = 2;
  repeated LogMatch matches = 3;
  uint32 limit = 4;
  Order order = 5;
}

message EventLog {
  string source = 2;
  string name = 3;
  .google.protobuf.Struct meta = 5;
}

message AlarmLog {
  string source = 2;
  string name = 3;
  AlarmKind kind = 4;
  AlarmStatus status = 5;
}

message CommandLog {
  string source = 2;
  string name = 3;
  string target = 4;
  .google.protobuf.Struct parameters = 5;
}

message LogItem {
  .google.protobuf.Timestamp timestamp = 1;
  oneof item {
    EventLog event = 2;
    AlarmLog alarm = 3;
    CommandLog command = 4;
  }
}

message MeasureId {
  string source = 1;
  repeated string paths = 2;
}

message MeasureConstraint {
  .google.protobuf.Timestamp start = 1;
  .google.protobuf.Timestamp end = 2;
  repeated MeasureId measures = 3;
  uint32 limit = 4;
  Order order = 5;
}
