syntax = "proto3";

package deps.model.nameplate.v2;

import "deps/vnd/alarm.v1.proto";
import "deps/vnd/parameter.v1.proto";

option java_package = "io.github.grida_energy.deps.model.nameplate.v2";

// WellKnownNodeType
enum Wknt {
  WKNT_UNSPECIFIED = 0;
  // preset
  WKNT_BESS_V1 = 100;
  WKNT_UPMS_V1 = 101;
  WKNT_DBSERVER_V1 = 102;

  // model/energy-device
  WKNT_ESD_BANK_V1 = 1000;
  WKNT_PCS_PH3_PCS_V1 = 1010;
  WKNT_NET_METER_PH3_V1 = 1050;

  // model/manager
  WKNT_RMS_V1 = 10000;
}

message Quadrant {
  float q1 = 1;
  float q2 = 2;
  float q3 = 3;
  float q4 = 4;
}

message NameplateFilter {}
message Nameplate {
  deps.vnd.v1.AlarmMeta alarm_meta = 1;
  deps.vnd.v1.ParamMeta param_meta = 2;
  Wknt wknt = 3;
  EndPointRatings ratings = 5;
}

message DeviceRatings {
  StorageRatings storage = 1;
  PcsRatings pcs = 2;
}

message EndPointRatings {
  DeviceRatings total = 1;
  map<string, StorageRatings> storage_devices = 2;
  map<string, PcsRatings> pcs_devices = 3;
}

message StorageRatings {
  float wh = 1;
  float ahr = 2;
  // float max_cha_rte = 14;
  // float max_dis_cha_rte = 15;
}

message PcsRatings {
  float w = 1;
  float va = 2;
  Quadrant var = 3;
  float a = 7;
  Quadrant pf = 8;
}

