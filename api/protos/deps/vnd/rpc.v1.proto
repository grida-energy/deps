syntax = "proto3";

package deps.vnd.v1;

option java_package = "io.github.grida_energy.deps.vnd.v1";

import "deps/vnd/alarm.v1.proto";
import "deps/vnd/parameter.v1.proto";

import "deps/rpc/header.v1.proto";
import "google/protobuf/timestamp.proto";

message Rpc {
  message AlarmResponse {
    .google.protobuf.Timestamp timestamp = 1;
    AlarmData payload = 2;
  }

  // "writes" performs first then "reads"
  message ParamReadWriteRequest {
    repeated ParamIdRange reads = 1;
    ParamBlock writes = 2;
  }

  // error codes would be specified in deps.rpc.Response
  message ParamReadWriteResponse {
    // returns successfully read values if possible
    ParamBlock reads = 1;
    // returns successfully writen ids if possible
    repeated ParamIdRange writes = 2;
  }

  message ParamRequest {
    .deps.rpc.v1.Request header = 1;
    ParamReadWriteRequest payload = 3;
  }

  message ParamResponse {
    .deps.rpc.v1.Response header = 1;
    ParamReadWriteResponse payload = 4;
  }
}