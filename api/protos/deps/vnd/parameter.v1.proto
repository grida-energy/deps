syntax = "proto3";

package deps.vnd.v1;

option java_package = "io.github.grida_energy.deps.vnd.v1";

import "google/protobuf/struct.proto";
// import "deps/rpc/reqresp.proto";

// 제조사 고유 파라미터 메타 정보
message ParamInfo {
  enum ParamKind {
    PARAM_KIND_NA = 0;
    PARAM_KIND_NULL = 1;
    PARAM_KIND_NUMBER = 2;
    PARAM_KIND_STRING = 3;
    PARAM_KIND_BOOL = 4;
    PARAM_KIND_STRUCT = 5;
    PARAM_KIND_LIST = 6;
  }
  message MinMax {
    double min = 1;
    double max = 2;
    bool exclusive_min = 3;
    bool exclusive_max = 4;
  }
  message OneOfPick { map<string, double> options = 1; }

  string param_name = 1;
  string description = 2;
  string unit = 3;
  oneof constraint {
    MinMax min_max = 4;
    OneOfPick pick = 5;
  }
  repeated ParamKind accepts = 10;
}

message ParamMeta { map<uint32, ParamInfo> param_infos = 1; }

message ParamIdRange {
  uint32 start = 1;
  uint32 length = 2;
}

// message ParamId { uint32 param_id = 1; }
// message ParamIdValue {
//   uint32 param_id = 1;
//   .google.protobuf.Value param_value = 2;
// }

message ParamBlock {
  repeated ParamIdRange ranges = 1;
  repeated .google.protobuf.Value values = 2;
}

